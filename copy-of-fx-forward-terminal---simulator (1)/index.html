
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL - FX FORWARDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
        
        :root {
            --bbg-bg: #000000;
            --bbg-amber: #ff9900;
            --bbg-white: #ffffff;
            --bbg-green: #00ff00;
            --bbg-red: #ff0000;
            --bbg-blue: #0000ff;
            --bbg-header-bg: #111111;
            --bbg-border: #333333;
        }

        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: var(--bbg-bg);
            color: var(--bbg-white);
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-size: 12px;
        }

        .bbg-header {
            background-color: var(--bbg-header-bg);
            border-bottom: 1px solid var(--bbg-border);
            color: var(--bbg-amber);
            font-weight: bold;
            padding: 2px 8px;
        }

        input, select {
            background: #000;
            border: 1px solid #444;
            color: var(--bbg-white);
            padding: 2px 4px;
            outline: none;
            font-family: inherit;
        }

        button {
            background: #222;
            border: 1px solid #444;
            color: var(--bbg-amber);
            padding: 4px 8px;
            cursor: pointer;
        }

        button:hover {
            background: var(--bbg-amber);
            color: #000;
        }

        /* IB Chat Style */
        .ib-window {
            position: fixed;
            bottom: 24px;
            right: 16px;
            width: 320px;
            height: 400px;
            background: #111;
            border: 2px solid #555;
            display: flex;
            flex-direction: column;
            z-index: 50;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .ib-header {
            background: #444;
            color: #fff;
            padding: 4px 8px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
