steps:
# Build main application
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/edusimlabs-main:$COMMIT_SHA', './main']

# Push main image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/edusimlabs-main:$COMMIT_SHA']

# Deploy main to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'edusimlabs-main'
  - '--image'
  - 'gcr.io/$PROJECT_ID/edusimlabs-main:$COMMIT_SHA'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'

# Build FX Forward Terminal
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/edusimlabs-fx-forward:$COMMIT_SHA', './fx-forward-terminal']

# Push FX image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/edusimlabs-fx-forward:$COMMIT_SHA']

# Deploy FX to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'edusimlabs-fx-forward'
  - '--image'
  - 'gcr.io/$PROJECT_ID/edusimlabs-fx-forward:$COMMIT_SHA'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'

# Build Multiplayer Boardroom
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/edusimlabs-boardroom:$COMMIT_SHA', './multiplayer-boardroom']

# Push Boardroom image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/edusimlabs-boardroom:$COMMIT_SHA']

# Deploy Boardroom to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'edusimlabs-boardroom'
  - '--image'
  - 'gcr.io/$PROJECT_ID/edusimlabs-boardroom:$COMMIT_SHA'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'

# Build FICC Trademaster Pro
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/edusimlabs-trademaster:$COMMIT_SHA', './ficc-trademaster-pro']

# Push Trademaster image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/edusimlabs-trademaster:$COMMIT_SHA']

# Deploy Trademaster to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'edusimlabs-trademaster'
  - '--image'
  - 'gcr.io/$PROJECT_ID/edusimlabs-trademaster:$COMMIT_SHA'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'

# Build Proxy
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/edusimlabs-proxy:$COMMIT_SHA', '.']

# Push Proxy image
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/edusimlabs-proxy:$COMMIT_SHA']

# Deploy Proxy to Cloud Run
- name: 'gcr.io/cloud-builders/gcloud'
  args:
  - 'run'
  - 'deploy'
  - 'edusimlabs-proxy'
  - '--image'
  - 'gcr.io/$PROJECT_ID/edusimlabs-proxy:$COMMIT_SHA'
  - '--region'
  - 'us-central1'
  - '--platform'
  - 'managed'
  - '--allow-unauthenticated'

images:
- 'gcr.io/$PROJECT_ID/edusimlabs-main:$COMMIT_SHA'
- 'gcr.io/$PROJECT_ID/edusimlabs-fx-forward:$COMMIT_SHA'
- 'gcr.io/$PROJECT_ID/edusimlabs-boardroom:$COMMIT_SHA'
- 'gcr.io/$PROJECT_ID/edusimlabs-trademaster:$COMMIT_SHA'
- 'gcr.io/$PROJECT_ID/edusimlabs-proxy:$COMMIT_SHA'